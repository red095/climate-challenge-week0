name: CI

on:
  push:
    branches: [ main, setup-task ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python --version
          pip install -r requirements.txt

      - name: Check imports work
        run: |
          python -c "import pandas; import numpy; import matplotlib; print('All imports OK')"
